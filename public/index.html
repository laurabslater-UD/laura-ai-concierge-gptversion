<!DOCTYPE html>
<html>
<head>
<title>Laura AI Concierge</title>
<style>

body{
font-family:Arial;
background:#0A0A0A;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

#chat{
width:100%;
max-width:600px;
height:400px;
overflow:auto;
border:1px solid #333;
padding:20px;
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px 20px;
background:#426B96;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Unchained Digital AI Concierge</h1>

<div id="chat"></div>

<input id="message" placeholder="Ask me anything..." />
<button onclick="send()">Send</button>

<script>

async function send(){

const message = document.getElementById("message").value

const chat = document.getElementById("chat")

chat.innerHTML += "<p><b>You:</b> "+message+"</p>"

const response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:[
{
role:"user",
content:message
}
]
})
})

const data = await response.json()

chat.innerHTML += "<p><b>AI:</b> "+data.content[0].text+"</p>"

}

</script>

</body>
</html>
